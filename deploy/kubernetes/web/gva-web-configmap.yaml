apiVersion: v1
kind: ConfigMap
metadata:
  name: neptune-web-nginx-config
  namespace: neptune
  labels:
    app: neptune-web
    app.kubernetes.io/name: neptune-web
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # gzip 压缩
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
        gzip_min_length 1024;

        # 静态资源缓存（Vite 带 hash 的产物）
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # K8s 线上统一由 APISIX 处理 /aiInfra/* 到后端的转发；
        # 这里的前端 nginx 只负责静态资源和 SPA 回退。
        # SPA 路由回退
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
