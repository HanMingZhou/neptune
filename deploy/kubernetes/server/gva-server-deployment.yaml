apiVersion: apps/v1
kind: Deployment
metadata:
  name: neptune-server
  namespace: neptune
  labels:
    app: neptune-server
    app.kubernetes.io/name: neptune-server
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neptune-server
  template:
    metadata:
      labels:
        app: neptune-server
        app.kubernetes.io/name: neptune-server
        app.kubernetes.io/component: backend
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: neptune-server
          # 请替换为您实际的镜像仓库地址
          image: your-registry.com/neptune/server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8888
              name: http
              protocol: TCP
          env:
            - name: TZ
              value: "Asia/Shanghai"
            - name: GIN_MODE
              value: "release"
            - name: GVA_CONFIG
              value: "/app/config.yaml"
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /aiInfra/health
              port: 8888
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /aiInfra/health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          startupProbe:
            httpGet:
              path: /aiInfra/health
              port: 8888
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 3
      # imagePullSecrets:
      #   - name: your-registry-secret
      volumes:
        - name: config
          configMap:
            name: neptune-server-config
