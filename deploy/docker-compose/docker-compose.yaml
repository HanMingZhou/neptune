version: "3.8"

# Neptune AI Platform - Docker Compose 部署
# 使用方式: 在项目根目录执行 docker-compose -f deploy/docker-compose/docker-compose.yaml up -d

networks:
  neptune-net:
    driver: bridge
    ipam:
      config:
        - subnet: '177.7.0.0/16'

volumes:
  mysql-data:
  redis-data:

services:
  # ============== 前端 (Nginx + Vue3) ==============
  neptune-web:
    build:
      context: ../../web
      dockerfile: ./Dockerfile
    container_name: neptune-web
    restart: always
    ports:
      - '80:80'
    depends_on:
      - neptune-server
    networks:
      neptune-net:
        ipv4_address: 177.7.0.11

  # ============== 后端 (Go Gin) ==============
  neptune-server:
    build:
      context: ../../server
      dockerfile: ./Dockerfile
    container_name: neptune-server
    restart: always
    ports:
      - '8888:8888'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # 通过环境变量或挂载 config.yaml 来覆盖配置
      - GVA_CONFIG=/app/config.yaml
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      neptune-net:
        ipv4_address: 177.7.0.12

  # ============== MySQL 8.0 ==============
  mysql:
    image: mysql:8.0.21
    container_name: neptune-mysql
    command: >
      mysqld
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    restart: always
    ports:
      - '13306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: 'aiInfra'
      MYSQL_USER: 'neptune'
      MYSQL_PASSWORD: '123456'
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      neptune-net:
        ipv4_address: 177.7.0.13

  # ============== Redis 7 ==============
  redis:
    image: redis:7-alpine
    container_name: neptune-redis
    restart: always
    ports:
      - '16379:6379'
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data
    networks:
      neptune-net:
        ipv4_address: 177.7.0.14
